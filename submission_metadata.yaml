# Redrob Hackathon — Submission Metadata
#
# Filled-in metadata for Stage 3 review.

# ============================================================================
# Team identity
# ============================================================================
team_name: "redrob-ai"

primary_contact:
  name: "Redrob Team"
  email: "team@redrob.ai"
  phone: "+1-555-000-0000"

team_members:
  - name: "Redrob Team"
    email: "team@redrob.ai"
    role: "ML Engineer"

# ============================================================================
# Code and reproducibility
# ============================================================================
github_repo: "https://github.com/redrobai/redrobai"

sandbox_link: "https://redrobai.app"

reproduce_command: "python rank.py --candidates ./candidates.jsonl --out ./submission.csv"

# ============================================================================
# Compute environment
# ============================================================================
compute:
  platform: "MacBook Pro M2"
  cpu_cores: 8
  ram_gb: 16
  python_version: "3.11.4"
  os: "macOS 14.2"
  uses_gpu_for_inference: false
  has_network_during_ranking: false
  pre_computation_required: true
  pre_computation_time_minutes: 55

# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Groq (Llama 3.3 70B via langchain-groq)"
  - "sentence-transformers"

ai_usage_summary: |
  Phase A pre-computation uses Groq (Llama 3.3 70B) via langchain-groq for two purposes:
  (1) One initial call to analyze the job description and extract key requirements;
  (2) Approximately 38 batch LLM calls to evaluate candidates against those requirements,
      generating reasoning and scores for each candidate. Sentence-transformers is used
      to compute semantic embeddings for all candidates during the same phase.
  Phase B (rank.py) is completely network-free — it loads pre-computed artifacts and
  produces the ranked CSV using only local compute. No LLM calls, no embedding model
  loading, and no network access during the ranking phase.

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  Two-phase offline-capable ranker. Phase A pre-computes LLM scores, semantic
  embeddings, and behavioral signals for all candidates using Groq and sentence-
  transformers. Phase B loads the pre-computed artifacts, recomputes a weighted
  final score (65% LLM, 20% semantic, 15% behavioral), sorts by descending score
  with candidate_id tie-breaking, and outputs the top-100 ranked candidates to
  submission.csv. Weight tuning is supported by editing rank_config.json and
  re-running Phase B without re-computing Phase A.

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: false
  reproduction_tested: true